<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact page Nile Rafting Company</title>
    <meta name="description" content="This is a contact page of a water rafting website where users can contact us">
    <meta name="author" content="James Omondi">
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="company logo">
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="con">
       <div class="info">
            <h1>Nile White Water Rafting Company</h1>
            <p>123 Main River Street<br>Kolob, California<br>+1 999 999 9999<br>info@nilewhitewater.com</p>
        
       </div>
       <div class="contact">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2372.2767378480507!2d33.16852702727328!3d0.48051578882566004!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x177e7e77df17684d%3A0x3b54f5c24b4d3124!2sWhite%20Nile%20Rafting%20Ltd%20%7C%20White%20Water%20Rafting%20%7C%20Rafting%20in%20Uganda%20%7C%20Water%20Rafting%20Uganda%20%7C%20White%20Nile%20Rafting%20Uganda!5e0!3m2!1sen!2ske!4v1780925904456!5m2!1sen!2ske"
              width="500" height="350" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

              <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="eg. John Doe">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="eg. name@gmail.com">

                <P>Message Purpose</P>
                <fieldset>
                    <label for="general"><input type="radio" id="general" value="general" name="message-purpose">  General inquiry</label>
                    <label for="reservation" ><input type="radio" id="reservation" value="reservation" name="message-purpose">  Reservation Question</label>
                    <label for="suggestion"><input type="radio" id="suggestion" value="suggestion" name="message-purpose">  Website Suggestion</label>
                </fieldset>
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="3" placeholder="Type here..."></textarea>

                <input type="checkbox" id="subscription" name="subscription">
                <label for="subscription">Please Subscribe me to monthly newsletter</label>

                <button type="submit">Get in Touch!</button>
              </form>
       </div>
       <div class="employee">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/employee1.jpg" alt="employee1" width="200">
                <figcaption>Operations Manager</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="employee2" width="200">
                <figcaption>Manager</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="employee3" width="200">
                <figcaption>customer support</figcaption>
            </figure>
       </div>
    </main>
    <footer>
        <p>© 2026 Nile Rafting Company. James omondi</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"> <img src="images/facebook.png" alt="facebook icon"></a>
            <a href="https://instagram.com"><img src="images/insta.jpg" alt="instagram icon"></a>
            <a href="https://twitter.com"><img src="images/twitter.png" alt="twitter icon"></a>
        </nav>
    </footer>

</body>

</html>
