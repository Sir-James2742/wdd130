<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <main>
        <h1>✔ Basic HTML and CSS Quiz</h1>
        <form>
            <label for="acronym">1. What does the acronym CSS stand for?</label>
            <input type="text" id="acronym" name="acronym" required>

            <label>2. How are id and class attributes selected in CSS?</label>
            <textarea id="atttributes" name="attributes" rows="4"></textarea>

            <label for="comment">3. Which one of the following is a valid CSS comment</label>
            <select id="comment" name="comment" required>
                <option value="" disable selected hidden>Choose One...</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>

            <label for="declaration">4. What is the bottom margin given this declaration <br> <br><strong>margin: 10px 5px 15px;</strong></label>
            <input type="text" id="declaration" name="declaration">

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>
</html>
